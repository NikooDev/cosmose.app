<section class="flex flex-col">
	<div class="flex relative h-screen justify-center items-center">
		<div class="container mx-auto">
			<img ngSrc="assets/logo.svg" alt="logo" height="34.93" width="200" class="mb-8" priority/>
			<div class="flex justify-between gap-5">
				<app-card>
					<form class="flex flex-col w-[450px]" action="/team-building" method="get">
						<h1 class="font-NexaHeavy text-2xl text-center">Créer un compte</h1>
						<button>Lier un compte Google</button>
						<p class="divider">
							<span>ou</span>
						</p>
						<div class="flex w-full gap-4 mt-8">
							<div class="w-full">
								<label class="flex mb-1.5 font-NexaHeavy" for="name">Nom</label>
								<input type="text" id="name" class="w-full h-9 text-slate-800 rounded-2xl px-3 font-NexaHeavy"/>
							</div>
							<div class="w-full">
								<label class="flex mb-1.5 font-NexaHeavy" for="firstname">Prénom</label>
								<input type="text" id="firstname" class="w-full h-9 text-slate-800 rounded-2xl px-3 font-NexaHeavy"/>
							</div>
						</div>
						<div class="flex w-full gap-4 mt-4">
							<div class="w-full">
								<label class="flex mb-1.5 font-NexaHeavy" for="email">Adresse e-mail</label>
								<input type="text" id="email" class="w-full h-9 text-slate-800 rounded-2xl px-3 font-NexaHeavy"/>
							</div>
						</div>
						<div class="flex w-full gap-4 mt-4">
							<div class="w-full">
								<label class="flex mb-1.5 font-NexaHeavy" for="password">Mot de passe</label>
								<input type="password" id="password" class="w-full h-9 text-slate-800 rounded-2xl px-3 font-NexaHeavy"/>
							</div>
						</div>
						<div class="flex w-full gap-4 mt-4">
							<p>Veuillez accepter notre politique de confidentialité</p>
						</div>
						<button type="submit">S'inscrire</button>
						<p>Vous avez déjà un compte ? <button class="inline-flex underline">Se connecter</button></p>
					</form>
				</app-card>
				<div class="relative w-1/2 h-full hero-img scale-[130%] -right-[13%] mt-12">
					@for (image of images; track image.src; let index = $index) {
						<img [ngSrc]="image.src" [width]="image.width" [height]="image.height" priority
								 [ngClass]="getAnimateClass(index, image.animated)"
								 (load)="onLoadImage($event, index)"
								 class="absolute rounded-2xl object-cover" alt="image"/>
					}
				</div>
			</div>
		</div>
	</div>
</section>
