<ng-container *ngIf="isAdminRoute; else isUsers">
	<section class="flex flex-col bg-theme-50 h-screen w-screen">
		<app-header></app-header>
		<app-sidebar></app-sidebar>
		<div class="pt-16 pl-72">
			<div class="p-10 mx-auto text-slate-800">
				<router-outlet></router-outlet>
			</div>
		</div>
	</section>
</ng-container>

<ng-template #isUsers>
	@if (pending()) {
		<div @slideInDown class="fixed bg-white p-1 rounded-full top-8 left-1/2 transform -translate-x-1/2">
			<app-loader color="#4b2edb" [size]="40" [strokeWidth]="4"></app-loader>
		</div>
	}
	<router-outlet></router-outlet>
</ng-template>
